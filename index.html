<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NuBrakes KPI Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{font-weight:700;font-size:17px;color:#0f172a}
.sub{font-size:11px;color:#94a3b8;margin-top:2px}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select{padding:6px 10px;border-radius:7px;border:1px solid #e2e8f0;font-size:12px;color:#334155;background:#fff;cursor:pointer;outline:none}
.toggle{display:flex;background:#f1f5f9;border-radius:8px;padding:3px;gap:2px}
.toggle button{padding:5px 16px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:#94a3b8}
.toggle button.active{background:#fff;color:#6366f1;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.tabs{display:flex;gap:4px;border-bottom:1px solid #e2e8f0;padding:0 24px;background:#fff}
.tab{padding:10px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#6366f1;border-bottom-color:#6366f1}
.main{padding:20px 24px;max-width:1300px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px;margin-bottom:22px}
.card{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e2e8f0}
.card-label{font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.card-val{font-size:20px;font-weight:700;color:#0f172a}
.card-chg{font-size:11px;margin-top:3px;font-weight:500}
.up{color:#10b981}.dn{color:#f43f5e}
.panel{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:18px 22px;margin-bottom:14px}
.panel-title{font-size:13px;font-weight:600;color:#0f172a;margin-bottom:14px}
.pills{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#64748b}
.ctoggle{display:flex;gap:5px;margin-left:auto}
.ctoggle button{padding:3px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#64748b}
.ctoggle button.active{background:#0f172a;color:#fff;border-color:#0f172a}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:9px 12px;text-align:right;color:#64748b;font-weight:600;border-bottom:1px solid #e2e8f0;background:#f8fafc}
th:first-child{text-align:left}
td{padding:7px 12px;text-align:right;font-weight:500}
td:first-child{text-align:left;color:#64748b}
tr:nth-child(even){background:#fafafa}
.ai-row{display:flex;gap:8px;margin-bottom:10px}
.ai-row input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid #e2e8f0;font-size:12px;outline:none}
.ai-row button{padding:9px 16px;border-radius:8px;background:#6366f1;color:#fff;border:none;font-weight:600;font-size:12px;cursor:pointer}
.qpills{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.qpill{padding:3px 9px;border-radius:20px;font-size:10px;cursor:pointer;border:1px solid #e2e8f0;background:#f8fafc;color:#64748b}
.ai-label{font-size:10px;font-weight:600;color:#6366f1;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.ai-body{font-size:12px;line-height:1.7;white-space:pre-wrap}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:#94a3b8;font-size:14px}
.hidden{display:none}
canvas{max-height:280px}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">NuBrakes KPI Dashboard</div>
    <div class="sub">Live data · Daily aggregated metrics</div>
  </div>
  <div class="controls">
    <select id="mktSel"></select>
    <select id="chSel"></select>
    <div class="toggle">
      <button data-days="1" class="active">Day</button>
      <button data-days="7">Week</button>
      <button data-days="30">Month</button>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="overview">Overview</button>
  <button class="tab" data-tab="trends">Trends</button>
  <button class="tab" data-tab="ai">AI Insights</button>
</div>

<div class="main">
  <div id="msg" class="loading">Loading data...</div>

  <div id="overview" class="hidden">
    <div class="cards" id="cards"></div>
    <div class="panel">
      <div class="panel-title">Revenue &amp; Leads</div>
      <canvas id="ovChart"></canvas>
    </div>
  </div>

  <div id="trends" class="hidden">
    <div class="panel">
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px">
        <span style="font-size:11px;color:#64748b;font-weight:600">Metrics:</span>
        <div class="pills" id="mPills" style="margin:0;flex:1"></div>
        <div class="ctoggle">
          <button id="lineBtn" class="active">Line</button>
          <button id="barBtn">Bar</button>
        </div>
      </div>
    </div>
    <div class="panel"><canvas id="trChart"></canvas></div>
    <div class="panel" style="padding:0;overflow:hidden">
      <div style="overflow-x:auto"><table id="tbl"></table></div>
    </div>
  </div>

  <div id="ai" class="hidden" style="max-width:720px">
    <div class="panel">
      <div class="panel-title">Ask about your KPIs</div>
      <div id="aiCtx" style="font-size:11px;color:#94a3b8;margin-bottom:12px"></div>
      <div class="ai-row">
        <input id="aiInput" type="text" placeholder="e.g. Which market has the best conversion rate?"/>
        <button id="aiBtn">Ask</button>
      </div>
      <div class="qpills" id="qpills"></div>
    </div>
    <div class="panel hidden" id="aiLoad" style="color:#94a3b8;font-size:12px">Analyzing...</div>
    <div class="panel hidden" id="aiOut">
      <div class="ai-label">AI Insight</div>
      <div class="ai-body" id="aiText"></div>
    </div>
  </div>
</div>

<script>
var DATA_URL = "https://corsproxy.io/?url=https://nubrakes-analytics.github.io/ai-data/data-ai.json";
var METRICS = [
  {key:"leads",       label:"Leads",          format:"number",  color:"#6366f1"},
  {key:"jobs_booked", label:"Booking Jobs",   format:"number",  color:"#0ea5e9"},
  {key:"canceled_jobs",label:"Canceled Jobs", format:"number",  color:"#f43f5e"},
  {key:"jobs_completed",label:"Completed",    format:"number",  color:"#10b981"},
  {key:"revenue",     label:"Revenue",        format:"currency",color:"#f59e0b"},
  {key:"bookingRate", label:"Booking Rate",   format:"percent", color:"#8b5cf6"},
  {key:"cancelRate",  label:"Cancel Rate",    format:"percent", color:"#ef4444"},
  {key:"convRate",    label:"Conv. Rate",     format:"percent", color:"#14b8a6"},
  {key:"aov",         label:"AOV",            format:"currency",color:"#f97316"}
];
var NEG = {canceled_jobs:1, cancelRate:1};
var QUICK = ["Summarize performance","What is driving cancellations?","How is the booking rate trending?","Top performing channel?"];

var rawData = [];
var rangeDays = 1;
var activeTab = "overview";
var chartType = "line";
var activeMetrics = {leads:1, jobs_booked:1, jobs_completed:1, revenue:1};
var ovChart = null, trChart = null;

function fmt(v, f) {
  if (v === null || v === undefined || isNaN(v)) return "-";
  if (f === "currency") return "$" + Number(v).toLocaleString();
  if (f === "percent") return Number(v).toFixed(1) + "%";
  return Number(v).toLocaleString();
}

function sumKPI(rows, key) {
  var leads=0, booked=0, canceled=0, completed=0, rev=0;
  for (var i=0; i<rows.length; i++) {
    leads    += rows[i].leads || 0;
    booked   += rows[i].jobs_booked || 0;
    canceled += rows[i].canceled_jobs || 0;
    completed+= rows[i].jobs_completed || 0;
    rev      += rows[i].revenue || 0;
  }
  if (key === "bookingRate")  return leads     > 0 ? +((booked/leads)*100).toFixed(1) : 0;
  if (key === "cancelRate")   return booked    > 0 ? +((canceled/booked)*100).toFixed(1) : 0;
  if (key === "convRate")     return leads     > 0 ? +((completed/leads)*100).toFixed(1) : 0;
  if (key === "aov")          return completed > 0 ? Math.round(rev/completed) : 0;
  if (key === "revenue")      return rev;
  if (key === "leads")        return leads;
  if (key === "jobs_booked")  return booked;
  if (key === "canceled_jobs")return canceled;
  if (key === "jobs_completed")return completed;
  return 0;
}

function aggregate(rows) {
  var m = {};
  for (var i=0; i<rows.length; i++) {
    var r = rows[i];
    var d = r.date.split("T")[0];
    if (!m[d]) m[d] = {date:d, leads:0, jobs_booked:0, canceled_jobs:0, jobs_completed:0, revenue:0};
    m[d].leads         += r.leads || 0;
    m[d].jobs_booked   += r.jobs_booked || 0;
    m[d].canceled_jobs += r.canceled_jobs || 0;
    m[d].jobs_completed+= r.jobs_completed || 0;
    m[d].revenue       += r.invoiced_customer_price || 0;
  }
  var arr = Object.values(m).sort(function(a,b){ return a.date < b.date ? -1 : 1; });
  for (var j=0; j<arr.length; j++) {
    var x = arr[j];
    x.label = new Date(x.date + "T12:00:00").toLocaleDateString("en-US", {month:"short", day:"numeric"});
    x.bookingRate = x.leads        > 0 ? +((x.jobs_booked/x.leads)*100).toFixed(1) : 0;
    x.cancelRate  = x.jobs_booked  > 0 ? +((x.canceled_jobs/x.jobs_booked)*100).toFixed(1) : 0;
    x.convRate    = x.leads        > 0 ? +((x.jobs_completed/x.leads)*100).toFixed(1) : 0;
    x.aov         = x.jobs_completed > 0 ? Math.round(x.revenue/x.jobs_completed) : 0;
  }
  return arr;
}

function getFiltered() {
  var mkt = document.getElementById("mktSel").value;
  var ch  = document.getElementById("chSel").value;
  return rawData.filter(function(r) {
    return (mkt === "All" || r.market === mkt) && (ch === "All" || r.channel === ch);
  });
}

function getPeriod() {
  var days   = aggregate(getFiltered());
  var period = days.slice(-rangeDays);
  var prev   = days.slice(-rangeDays * 2, -rangeDays);
  return {period:period, prev:prev};
}

function renderCards(period, prev) {
  var html = "";
  for (var i=0; i<METRICS.length; i++) {
    var m   = METRICS[i];
    var val = sumKPI(period, m.key);
    var pval= sumKPI(prev,   m.key);
    var diff= val - pval;
    var pct = pval !== 0 ? ((diff/pval)*100).toFixed(1) : 0;
    var up  = diff >= 0;
    var good= NEG[m.key] ? !up : up;
    var chg = prev.length > 0
      ? '<div class="card-chg ' + (good ? "up" : "dn") + '">' + (up ? "▲" : "▼") + " " + Math.abs(pct) + "% vs prev</div>"
      : "";
    html += '<div class="card"><div class="card-label">' + m.label + '</div><div class="card-val">' + fmt(val, m.format) + "</div>" + chg + "</div>";
  }
  document.getElementById("cards").innerHTML = html;
}

function renderOverview(period) {
  var ctx = document.getElementById("ovChart").getContext("2d");
  if (ovChart) ovChart.destroy();
  ovChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: period.map(function(d){ return d.label; }),
      datasets: [
        {label:"Revenue", data:period.map(function(d){return d.revenue;}), borderColor:"#f59e0b", backgroundColor:"rgba(245,158,11,.08)", tension:.3, pointRadius:2, yAxisID:"y"},
        {label:"Leads",   data:period.map(function(d){return d.leads;}),   borderColor:"#6366f1", backgroundColor:"rgba(99,102,241,.08)",  tension:.3, pointRadius:2, yAxisID:"y1"}
      ]
    },
    options: {
      responsive:true,
      interaction:{mode:"index", intersect:false},
      plugins:{legend:{position:"top"}},
      scales:{
        y:  {position:"left",  ticks:{callback:function(v){return "$"+v.toLocaleString();}}},
        y1: {position:"right", grid:{drawOnChartArea:false}}
      }
    }
  });
}

function renderPills() {
  var html = "";
  for (var i=0; i<METRICS.length; i++) {
    var m = METRICS[i];
    var on = !!activeMetrics[m.key];
    var style = on ? "background:" + m.color + ";color:#fff;border-color:" + m.color : "";
    html += '<span class="pill" data-key="' + m.key + '" style="' + style + '">' + m.label + "</span>";
  }
  var el = document.getElementById("mPills");
  el.innerHTML = html;
  var pills = el.querySelectorAll(".pill");
  for (var j=0; j<pills.length; j++) {
    pills[j].addEventListener("click", function() {
      var k = this.getAttribute("data-key");
      if (activeMetrics[k]) { delete activeMetrics[k]; } else { activeMetrics[k] = 1; }
      renderTrends();
    });
  }
}

function renderTrends() {
  renderPills();
  var period = getPeriod().period;
  var keys = Object.keys(activeMetrics);
  var ctx = document.getElementById("trChart").getContext("2d");
  if (trChart) trChart.destroy();
  var datasets = [];
  for (var i=0; i<keys.length; i++) {
    var m = null;
    for (var j=0; j<METRICS.length; j++) { if (METRICS[j].key === keys[i]) { m = METRICS[j]; break; } }
    if (!m) continue;
    datasets.push({
      label: m.label,
      data:  period.map(function(d){ return d[keys[i]]; }),
      borderColor: m.color,
      backgroundColor: chartType === "bar" ? m.color + "bb" : "transparent",
      tension: .3, pointRadius: 2,
      borderRadius: chartType === "bar" ? 4 : 0
    });
  }
  trChart = new Chart(ctx, {
    type: chartType,
    data: {labels: period.map(function(d){return d.label;}), datasets: datasets},
    options: {responsive:true, interaction:{mode:"index", intersect:false}, plugins:{legend:{position:"top"}}}
  });

  // Table
  var thead = "<tr><th>Date</th>";
  for (var i=0; i<METRICS.length; i++) thead += "<th>" + METRICS[i].label + "</th>";
  thead += "</tr>";
  var tbody = "";
  var rev = period.slice().reverse();
  for (var r=0; r<rev.length; r++) {
    var row = rev[r];
    tbody += "<tr><td>" + row.label + "</td>";
    for (var c=0; c<METRICS.length; c++) tbody += "<td>" + fmt(row[METRICS[c].key], METRICS[c].format) + "</td>";
    tbody += "</tr>";
  }
  document.getElementById("tbl").innerHTML = "<thead>" + thead + "</thead><tbody>" + tbody + "</tbody>";
}

function showTab(t) {
  activeTab = t;
  var ids = ["overview","trends","ai"];
  for (var i=0; i<ids.length; i++) {
    document.getElementById(ids[i]).classList.toggle("hidden", ids[i] !== t);
  }
  document.querySelectorAll(".tab").forEach(function(b){ b.classList.toggle("active", b.getAttribute("data-tab") === t); });
  if (t === "trends") renderTrends();
}

function render() {
  var p = getPeriod();
  renderCards(p.period, p.prev);
  renderOverview(p.period);
  if (activeTab === "trends") renderTrends();
  var mkt = document.getElementById("mktSel").value;
  var ch  = document.getElementById("chSel").value;
  var label = rangeDays === 1 ? "Day" : rangeDays === 7 ? "Week" : "Month";
  document.getElementById("aiCtx").textContent =
    (mkt !== "All" ? "Market: " + mkt + "  " : "") +
    (ch  !== "All" ? "Channel: " + ch  + "  " : "") +
    label + " view";
}

async function doAI() {
  var q = document.getElementById("aiInput").value.trim();
  if (!q) return;
  document.getElementById("aiOut").classList.add("hidden");
  document.getElementById("aiLoad").classList.remove("hidden");
  document.getElementById("aiBtn").disabled = true;
  var period = getPeriod().period;
  var totals = METRICS.map(function(m){ return m.label + ": " + fmt(sumKPI(period, m.key), m.format); }).join(", ");
  var mkt = document.getElementById("mktSel").value;
  var ch  = document.getElementById("chSel").value;
  try {
    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514", max_tokens: 1000,
        system: "You are a KPI analyst for NuBrakes, a mobile brake repair service. Answer concisely with bullet points.\nFilters: Market=" + mkt + ", Channel=" + ch + ", Period=last " + rangeDays + " day(s).\nPeriod totals: " + totals,
        messages: [{role:"user", content:q}]
      })
    });
    var data = await res.json();
    document.getElementById("aiText").textContent = (data.content && data.content[0]) ? data.content[0].text : "No response.";
    document.getElementById("aiOut").classList.remove("hidden");
  } catch(e) {
    document.getElementById("aiText").textContent = "Error fetching response.";
    document.getElementById("aiOut").classList.remove("hidden");
  }
  document.getElementById("aiLoad").classList.add("hidden");
  document.getElementById("aiBtn").disabled = false;
}

// ---- Boot ----
fetch(DATA_URL)
  .then(function(r){ return r.json(); })
  .then(function(data) {
    rawData = data;
    document.getElementById("msg").classList.add("hidden");
    document.getElementById("overview").classList.remove("hidden");

    var markets = ["All"];
    var seen = {};
    for (var i=0; i<data.length; i++) {
      if (!seen[data[i].market]) { seen[data[i].market]=1; markets.push(data[i].market); }
    }
    markets.sort(function(a,b){ return a==="All"?-1:a.localeCompare(b); });

    var mSel = document.getElementById("mktSel");
    mSel.innerHTML = markets.map(function(m){ return "<option>" + m + "</option>"; }).join("");

    function updateChannels() {
      var mkt = mSel.value;
      var chs = ["All"]; var cseen = {};
      for (var i=0; i<data.length; i++) {
        if ((mkt==="All"||data[i].market===mkt) && !cseen[data[i].channel]) {
          cseen[data[i].channel]=1; chs.push(data[i].channel);
        }
      }
      chs.sort(function(a,b){ return a==="All"?-1:a.localeCompare(b); });
      document.getElementById("chSel").innerHTML = chs.map(function(c){ return "<option>" + c + "</option>"; }).join("");
    }
    updateChannels();
    mSel.addEventListener("change", function(){ updateChannels(); render(); });
    document.getElementById("chSel").addEventListener("change", render);

    document.querySelectorAll(".toggle button").forEach(function(b) {
      b.addEventListener("click", function() {
        document.querySelectorAll(".toggle button").forEach(function(x){ x.classList.remove("active"); });
        b.classList.add("active");
        rangeDays = +b.getAttribute("data-days");
        render();
      });
    });

    document.querySelectorAll(".tab").forEach(function(b) {
      b.addEventListener("click", function(){ showTab(b.getAttribute("data-tab")); });
    });

    document.getElementById("lineBtn").addEventListener("click", function() {
      chartType="line";
      document.getElementById("lineBtn").classList.add("active");
      document.getElementById("barBtn").classList.remove("active");
      renderTrends();
    });
    document.getElementById("barBtn").addEventListener("click", function() {
      chartType="bar";
      document.getElementById("barBtn").classList.add("active");
      document.getElementById("lineBtn").classList.remove("active");
      renderTrends();
    });

    document.getElementById("aiBtn").addEventListener("click", doAI);
    document.getElementById("aiInput").addEventListener("keydown", function(e){ if(e.key==="Enter") doAI(); });

    var qc = document.getElementById("qpills");
    qc.innerHTML = QUICK.map(function(q){ return '<span class="qpill">' + q + "</span>"; }).join("");
    qc.querySelectorAll(".qpill").forEach(function(p) {
      p.addEventListener("click", function(){ document.getElementById("aiInput").value = p.textContent; });
    });

    render();
  })
  .catch(function() {
    document.getElementById("msg").textContent = "Failed to load data. CORS or network issue.";
  });
</script>
</body>
</html>
